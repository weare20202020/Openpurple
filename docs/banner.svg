<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 200" width="920" height="200">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d0221"/>
      <stop offset="50%" stop-color="#150531"/>
      <stop offset="100%" stop-color="#0d0221"/>
    </linearGradient>
    <linearGradient id="leftG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="rightG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="50%" stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambient">
      <feGaussianBlur stdDeviation="30"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="920" height="200" fill="url(#bg)" rx="10"/>

  <!-- Ambient glow -->
  <ellipse cx="460" cy="100" rx="340" ry="70" fill="#7c3aed" opacity="0.07" filter="url(#ambient)"/>

  <!-- Terminal title bar -->
  <rect x="0" y="0" width="920" height="30" fill="#1a0040" rx="10"/>
  <rect x="0" y="15" width="920" height="15" fill="#1a0040"/>
  <circle cx="28" cy="15" r="5" fill="#ef4444" opacity="0.8"/>
  <circle cx="48" cy="15" r="5" fill="#f59e0b" opacity="0.8"/>
  <circle cx="68" cy="15" r="5" fill="#22c55e" opacity="0.8"/>

  <!-- OPEN (left half, muted purple) -->
  <text x="266" y="88" text-anchor="end" font-family="'Courier New', monospace" font-size="17" fill="url(#leftG)" opacity="0.7" filter="url(#glow)">в–Ҳв–Җв–Җв–Ҳ в–Ҳв–Җв–Җв–Ҳ в–Ҳв–Җв–Җв–Ҳ в–Ҳв–Җв–Җв–„</text>
  <text x="266" y="108" text-anchor="end" font-family="'Courier New', monospace" font-size="17" fill="url(#leftG)" opacity="0.7" filter="url(#glow)">в–Ҳ  в–Ҳ в–Ҳ  в–Ҳ в–Ҳв–Җв–Җв–Җ в–Ҳ  в–Ҳ</text>
  <text x="266" y="128" text-anchor="end" font-family="'Courier New', monospace" font-size="17" fill="url(#leftG)" opacity="0.7" filter="url(#glow)">в–Җв–Җв–Җв–Җ в–Ҳв–Җв–Җв–Җ в–Җв–Җв–Җв–Җ в–Җ  в–Җ</text>

  <!-- PURPLE (right half, bright white-purple) -->
  <text x="274" y="88" text-anchor="start" font-family="'Courier New', monospace" font-size="17" font-weight="bold" fill="url(#rightG)" filter="url(#glow)">в–Ҳв–Җв–Җв–Ҳ в–Ҳ  в–Ҳ в–Ҳв–Җв–Җв–Ҳ в–Ҳв–Җв–Җв–Ҳ в–Ҳ    в–Ҳв–Җв–Җв–Ҳ</text>
  <text x="274" y="108" text-anchor="start" font-family="'Courier New', monospace" font-size="17" font-weight="bold" fill="url(#rightG)" filter="url(#glow)">в–Ҳ  в–Ҳ в–Ҳ  в–Ҳ в–Ҳв–Җв–Җв–„ в–Ҳ  в–Ҳ в–Ҳ    в–Ҳв–Җв–Җв–Җ</text>
  <text x="274" y="128" text-anchor="start" font-family="'Courier New', monospace" font-size="17" font-weight="bold" fill="url(#rightG)" filter="url(#glow)">в–Ҳв–Җв–Җв–Җ в–Җв–Җв–Җв–Җ в–Җ  в–Җ в–Ҳв–Җв–Җв–Җ в–Җв–Җв–Җв–Җ в–Җв–Җв–Җв–Җ</text>

  <!-- Subtitle -->
  <text x="460" y="158" text-anchor="middle" font-family="system-ui, 'Segoe UI', sans-serif" font-size="11" fill="#6d28d9" letter-spacing="6">MULTI-AGENT COLLABORATION PLATFORM</text>

  <!-- Bottom: Agent status bar -->
  <text x="210" y="184" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#7c3aed">в–Ј A В· Alice</text>
  <text x="460" y="184" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#4c1d95">в—Ӣ B В· Bob</text>
  <text x="710" y="184" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#4c1d95">в—Ӣ C В· Carol</text>
</svg>
